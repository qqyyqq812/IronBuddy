<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IronBuddy 数据库 · DB Viewer</title>
<style>
  :root {
    --bg: #0b0e13;
    --panel: #141924;
    --panel-2: #1a2030;
    --border: #252c3d;
    --text: #d6dbe6;
    --text-dim: #8891a8;
    --accent: #5ec8ff;
    --accent-2: #8be9a3;
    --warn: #f7c66b;
    --danger: #ff7a8a;
    --seed: #b57bff;
    --std: #8be9a3;
    --comp: #f7c66b;
    --bad:  #ff7a8a;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
                 "Microsoft YaHei", sans-serif;
    font-size: 14px;
  }
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 20px; background: var(--panel);
    border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 10;
  }
  header h1 { margin: 0; font-size: 17px; letter-spacing: 0.5px; }
  header .sub { color: var(--text-dim); font-size: 12px; margin-left: 10px; }
  header .actions a, header .actions button {
    background: var(--panel-2); border: 1px solid var(--border); color: var(--text);
    padding: 6px 12px; border-radius: 6px; text-decoration: none;
    font-size: 12px; cursor: pointer; margin-left: 6px;
  }
  header .actions a:hover, header .actions button:hover { border-color: var(--accent); }

  /* V5.1 维护面板（默认隐藏，点🩺展开） */
  .maint-panel {
    display: none; background: var(--panel); border-bottom: 1px solid var(--border);
    padding: 16px 20px;
  }
  .maint-panel.open { display: block; }
  .maint-panel .diag-row {
    display: grid; grid-template-columns: 200px 1fr; gap: 10px;
    font-size: 12px; padding: 4px 0;
  }
  .maint-panel .diag-row dt { color: var(--text-dim); }
  .maint-panel .diag-row dd { margin: 0; color: var(--text);
                               font-family: monospace; word-break: break-all; }
  .maint-panel .schema-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
    gap: 8px; margin-top: 10px;
  }
  .maint-panel .schema-item {
    background: var(--panel-2); border: 1px solid var(--border);
    border-radius: 4px; padding: 8px 12px; font-size: 12px;
  }
  .maint-panel .schema-item.missing { border-color: var(--danger); }
  .maint-panel .schema-item.empty { border-color: var(--warn); }
  .maint-panel .schema-item.ok { border-color: var(--accent-2); }
  .maint-panel .schema-item .tname { font-weight: 600; }
  .maint-panel .schema-item .tmeta { color: var(--text-dim); font-size: 10px; }
  .maint-panel .action-row {
    display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap;
  }
  .maint-panel .act-btn {
    background: var(--panel-2); border: 1px solid var(--border);
    color: var(--text); padding: 8px 14px; border-radius: 4px;
    font-size: 12px; cursor: pointer;
  }
  .maint-panel .act-btn:hover { border-color: var(--accent); }
  .maint-panel .act-btn.danger { border-color: var(--danger); color: var(--danger); }
  .maint-panel .act-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .maint-panel .maint-out {
    margin-top: 12px; background: #0b0e13; border: 1px solid var(--border);
    border-radius: 4px; padding: 12px; font-family: monospace;
    font-size: 11px; white-space: pre-wrap; max-height: 240px;
    overflow: auto; color: var(--text-dim);
  }
  .maint-panel .recs { margin-top: 10px; color: var(--warn); font-size: 12px; }
  .maint-panel .recs .r { margin-bottom: 4px; }

  .tabs { display: flex; gap: 4px; padding: 12px 20px 0; background: var(--bg);
          border-bottom: 1px solid var(--border); overflow-x: auto; }
  .tab {
    background: transparent; border: 0; border-bottom: 2px solid transparent;
    color: var(--text-dim); padding: 8px 16px; cursor: pointer;
    font-size: 13px; font-weight: 500; white-space: nowrap;
    display: flex; align-items: center; gap: 8px;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab .pill {
    font-size: 10px; padding: 1px 6px; border-radius: 8px;
    background: var(--panel-2); color: var(--text-dim);
  }
  .tab.active .pill { background: rgba(94, 200, 255, 0.15); color: var(--accent); }

  .filters {
    display: flex; gap: 12px; align-items: center;
    padding: 12px 20px; background: var(--panel-2);
    border-bottom: 1px solid var(--border); flex-wrap: wrap;
  }
  .filters label { font-size: 12px; color: var(--text-dim); }
  .filters select, .filters input {
    background: var(--bg); color: var(--text); border: 1px solid var(--border);
    padding: 5px 10px; border-radius: 4px; font-size: 12px;
  }
  .filters .badge {
    margin-left: auto; font-size: 12px; color: var(--text-dim);
  }
  .filters .badge span { color: var(--accent-2); }

  main { padding: 20px; }
  .table-wrap {
    background: var(--panel); border: 1px solid var(--border); border-radius: 8px;
    overflow: auto; max-height: calc(100vh - 220px);
  }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  thead th {
    position: sticky; top: 0; background: var(--panel-2); color: var(--text);
    text-align: left; padding: 8px 12px; font-weight: 600;
    border-bottom: 1px solid var(--border); white-space: nowrap;
  }
  tbody td {
    padding: 7px 12px; border-bottom: 1px solid var(--border);
    vertical-align: top; word-break: break-word;
  }
  tbody tr:hover { background: rgba(94, 200, 255, 0.04); }
  tbody tr.is-seed td:first-child::before {
    content: "●"; color: var(--seed); margin-right: 6px; font-size: 10px;
  }
  tbody tr.is-live td:first-child::before {
    content: "●"; color: var(--accent-2); margin-right: 6px; font-size: 10px;
  }
  td.num { text-align: right; font-variant-numeric: tabular-nums; }
  td.long { max-width: 360px; }
  td.editable { cursor: text; }
  td.just-saved {
    animation: flashSave 0.9s ease-out;
  }
  @keyframes flashSave {
    0%   { background: rgba(139, 233, 163, 0.45); }
    100% { background: transparent; }
  }
  textarea.inline-edit {
    width: 100%; min-height: 48px; background: #0f1320;
    color: var(--text); border: 1px solid var(--accent);
    border-radius: 3px; padding: 5px 7px; font: inherit; resize: vertical;
  }
  .empty { padding: 40px; text-align: center; color: var(--text-dim); }
  .err { padding: 20px; color: var(--danger); font-family: monospace; font-size: 12px; }
  footer {
    padding: 14px 20px; color: var(--text-dim); font-size: 11px;
    border-top: 1px solid var(--border);
  }
  footer code { background: var(--panel-2); padding: 1px 6px; border-radius: 3px; }

  /* 模型卡片 */
  .model-grid {
    display: grid; gap: 14px;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  }
  .model-card {
    background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
    padding: 16px 18px;
  }
  .model-card .mc-name {
    font-weight: 600; font-size: 15px; color: var(--text);
    display: flex; align-items: center; gap: 8px;
  }
  .model-card .mc-ex {
    display: inline-block; padding: 2px 10px; font-size: 10px;
    background: rgba(94,200,255,0.12); color: var(--accent);
    border-radius: 10px; margin-left: 6px;
  }
  .model-card.active .mc-name::before {
    content: "●"; color: var(--accent-2); font-size: 11px;
  }
  .model-card dl {
    display: grid; grid-template-columns: 80px 1fr; gap: 4px 10px;
    margin: 14px 0 0; font-size: 12px;
  }
  .model-card dt { color: var(--text-dim); }
  .model-card dd { margin: 0; color: var(--text); font-variant-numeric: tabular-nums; }
  .model-card .mc-notes {
    margin-top: 12px; padding-top: 10px; border-top: 1px dashed var(--border);
    color: var(--warn); font-size: 11px; line-height: 1.5;
  }
  .acc-bar {
    display: inline-block; width: 80px; height: 6px; background: var(--border);
    border-radius: 3px; margin-right: 8px; vertical-align: middle;
    position: relative;
  }
  .acc-bar::after {
    content: ""; position: absolute; left: 0; top: 0; bottom: 0;
    background: var(--accent-2); border-radius: 3px; width: var(--pct, 0%);
  }

  /* V5.0 · 7D 维度对比 */
  .fd-head {
    display: flex; align-items: center; gap: 16px; padding: 4px 4px 14px;
    flex-wrap: wrap;
  }
  .fd-head label {
    font-size: 12px; color: var(--text-dim);
    display: flex; align-items: center; gap: 6px;
  }
  .fd-head select {
    background: var(--bg); color: var(--text); border: 1px solid var(--border);
    padding: 5px 10px; border-radius: 4px; font-size: 12px; min-width: 200px;
  }
  .fd-head .fd-hint {
    margin-left: auto; font-size: 11px; color: var(--text-dim);
  }
  .fd-body {
    display: grid; grid-template-columns: 1fr 220px; gap: 16px;
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 8px; padding: 16px;
  }
  #fdHist { width: 100%; height: 360px; display: block;
            background: radial-gradient(ellipse at center, #0f1320 0%, #0b0e13 85%);
            border-radius: 4px; }
  .fd-side { font-size: 12px; color: var(--text); }
  .fd-side h4 { margin: 0 0 10px; font-size: 12px; color: var(--text-dim);
                text-transform: uppercase; letter-spacing: 0.5px; }
  .fd-side .lg-item {
    display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
  }
  .fd-side .dot { width: 12px; height: 12px; border-radius: 50%; }
  .fd-side .stats { margin-top: 16px; padding-top: 14px;
                     border-top: 1px dashed var(--border);
                     font-size: 11px; color: var(--text-dim); line-height: 1.7; }
  .fd-side .stats strong { color: var(--accent-2); }

  .fd-bottom {
    display: grid; grid-template-columns: 320px 1fr; gap: 16px; margin-top: 14px;
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 8px; padding: 16px;
  }
  #fdRadar { width: 100%; height: 260px; display: block;
             background: radial-gradient(ellipse at center, #0f1320 0%, #0b0e13 85%);
             border-radius: 4px; }
  .fd-ftab { width: 100%; border-collapse: collapse; font-size: 12px; }
  .fd-ftab th, .fd-ftab td {
    padding: 6px 10px; border-bottom: 1px solid var(--border);
    text-align: left;
  }
  .fd-ftab th { color: var(--text-dim); background: var(--panel-2);
                font-weight: 600; }
  .fd-ftab tr.active td { background: rgba(94,200,255,0.08); color: var(--accent); }
  .fd-ftab td.num { text-align: right; font-variant-numeric: tabular-nums; }

  /* 旧散点图（保留） */
  .scatter-wrap {
    background: var(--panel); border: 1px solid var(--border); border-radius: 8px;
    padding: 20px; display: grid;
    grid-template-columns: 1fr 200px; gap: 20px;
  }
  #scatter { width: 100%; height: 520px; display: block;
             background: radial-gradient(ellipse at center, #0f1320 0%, #0b0e13 85%);
             border-radius: 6px; }
  .legend { font-size: 12px; }
  .legend h4 { margin: 0 0 10px; font-size: 12px; color: var(--text-dim);
               text-transform: uppercase; letter-spacing: 0.5px; }
  .legend .lg-item {
    display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
  }
  .legend .dot {
    width: 12px; height: 12px; border-radius: 50%;
  }
  .legend .stats { margin-top: 20px; font-size: 11px; color: var(--text-dim);
                   line-height: 1.7; }
  .legend .stats strong { color: var(--accent-2); }
</style>
</head>
<body>

<header>
  <div>
    <h1>IronBuddy · Database Viewer</h1>
    <span class="sub" id="editBadge">一站式数据库可视化</span>
  </div>
  <div class="actions">
    <a href="/">&larr; 返回主控台</a>
    <button onclick="toggleMaint()">🩺 维护</button>
    <button onclick="loadCurrentTab()">🔄 刷新</button>
  </div>
</header>

<!-- V5.1 维护面板（默认隐藏） -->
<div class="maint-panel" id="maintPanel">
  <div id="maintDiag">加载诊断中…</div>
  <div class="action-row" id="maintActions"></div>
  <div class="maint-out" id="maintOut" style="display:none;"></div>
</div>

<nav class="tabs" id="tabs"></nav>

<div class="filters" id="filters">
  <label>动作类型
    <select id="fExercise"><option value="">全部</option></select>
  </label>
  <label>数据类型
    <select id="fSeed">
      <option value="all">全部</option>
      <option value="live">仅真实 (live)</option>
      <option value="seed">仅演示种子 (seed)</option>
    </select>
  </label>
  <label>行数上限
    <select id="fLimit">
      <option value="100">100</option>
      <option value="200" selected>200</option>
      <option value="500">500</option>
      <option value="1000">1000</option>
    </select>
  </label>
  <div class="badge" id="countBadge">—</div>
</div>

<main>
  <div class="table-wrap" id="tableWrap">
    <div class="empty">加载中…</div>
  </div>
</main>

<footer>
  图例：<span style="color: var(--seed)">●</span> 演示种子（<code>is_demo_seed=1</code>）
        <span style="color: var(--accent-2)">●</span> 真实数据（live）
  / 维护命令见 <code>docs/验收表/数据库模块.md</code>
  / 数据库路径：<code>data/ironbuddy.db</code>
</footer>

<script>
// 读 URL query 参数 ?edit=1 激活隐藏编辑模式（只在 voice_sessions 生效）
const URL_PARAMS = new URLSearchParams(location.search);
const EDIT_MODE = URL_PARAMS.get('edit') === '1';
// ?seed=seed/live/all 默认筛选（演示用：?seed=seed 只看种子数据，屏蔽 live 废 session）
const DEFAULT_SEED_FILTER = (function () {
  const v = (URL_PARAMS.get('seed') || '').toLowerCase();
  return (v === 'seed' || v === 'live' || v === 'all') ? v : 'all';
})();

const TABS = [
  { key: 'training_sessions',      label: '训练会话',      icon: '🏋️' },
  { key: 'rep_events',              label: '单次动作',      icon: '🔁' },
  { key: 'voice_sessions',          label: '闲聊对话',      icon: '💬' },
  { key: 'preference_history',      label: '偏好演化',      icon: '🧭' },
  { key: 'system_prompt_versions',  label: '提示词版本',    icon: '📜' },
  { key: 'daily_summary',           label: '每日总结',      icon: '📅' },
  { key: 'user_config',             label: '用户配置',      icon: '⚙️' },
  { key: 'model_registry',          label: '模型',          icon: '🧠',
    renderMode: 'cards' },
  { key: '__feature_dist',          label: '7D 维度对比',   icon: '📊',
    renderMode: 'feature_dist' },
];

// voice_sessions 可编辑字段白名单（前后端对齐）
const VOICE_EDITABLE = new Set([
  'transcript', 'response', 'summary', 'duration_s', 'trigger_src',
]);

let currentTab = TABS[0].key;
let tableCounts = {};

if (EDIT_MODE) {
  document.getElementById('editBadge').innerHTML =
    '一站式数据库可视化 · <span style="color:var(--warn)">编辑模式 ON</span>（双击 voice_sessions 单元格）';
}

function renderTabs() {
  const nav = document.getElementById('tabs');
  nav.innerHTML = '';
  TABS.forEach(function (t) {
    const btn = document.createElement('button');
    btn.className = 'tab' + (t.key === currentTab ? ' active' : '');
    let pill = '';
    if (t.key === '__embeddings') {
      pill = '';
    } else {
      const meta = tableCounts[t.key] || {};
      const total = (meta.total != null) ? meta.total : '—';
      pill = ' <span class="pill">' + total + '</span>';
    }
    btn.innerHTML = t.icon + ' ' + t.label + pill;
    btn.onclick = function () {
      currentTab = t.key;
      renderTabs();
      loadCurrentTab();
    };
    nav.appendChild(btn);
  });
}

function loadExercises() {
  fetch('/api/db/exercises')
    .then(function (r) { return r.json(); })
    .then(function (d) {
      const sel = document.getElementById('fExercise');
      sel.innerHTML = '<option value="">全部</option>';
      (d.exercises || []).forEach(function (ex) {
        const opt = document.createElement('option');
        opt.value = ex; opt.textContent = ex;
        sel.appendChild(opt);
      });
    });
}

function loadTableCounts() {
  fetch('/api/db/tables')
    .then(function (r) { return r.json(); })
    .then(function (d) {
      tableCounts = {};
      (d.tables || []).forEach(function (t) { tableCounts[t.name] = t; });
      renderTabs();
    });
}

// =========================================================================
// 通用表格渲染
// =========================================================================
function renderRows(data) {
  const wrap = document.getElementById('tableWrap');
  if (data.error) {
    wrap.innerHTML = '<div class="err">错误：' + data.error + '\n' +
                     (data.sql || '') + '</div>';
    return;
  }
  if (!data.rows || !data.rows.length) {
    wrap.innerHTML = '<div class="empty">没有数据。试试改动筛选条件。</div>';
    document.getElementById('countBadge').innerHTML =
      '显示 <span>0</span> 行';
    return;
  }
  const cols = data.columns;
  const seedIdx = cols.indexOf('is_demo_seed');
  const idIdx = cols.indexOf('id');
  const isVoice = (currentTab === 'voice_sessions');
  let html = '<table><thead><tr>';
  cols.forEach(function (c) { html += '<th>' + c + '</th>'; });
  html += '</tr></thead><tbody>';
  data.rows.forEach(function (row) {
    const seed = (seedIdx >= 0) ? row[seedIdx] : null;
    const rowClass = (seed === 1 ? 'is-seed' :
                      seed === 0 ? 'is-live' : '');
    const rowId = (idIdx >= 0) ? row[idIdx] : null;
    html += '<tr class="' + rowClass + '">';
    row.forEach(function (v, i) {
      const colName = cols[i];
      let cls = '';
      if (typeof v === 'number') cls = 'num';
      if (colName === 'prompt_text' || colName === 'transcript' ||
          colName === 'response' || colName === 'summary' ||
          colName === 'rec' || colName === 'user_msg' ||
          colName === 'assistant_msg' || colName === 'prompt' ||
          colName === 'notes') cls = 'long';
      // EDIT_MODE 下给 voice_sessions 的可编辑字段打标
      const editable = (EDIT_MODE && isVoice && VOICE_EDITABLE.has(colName)
                        && rowId != null);
      if (editable) cls += ' editable';
      const display = (v === null || v === undefined) ? '—' : String(v);
      const esc = display.replace(/&/g, '&amp;').replace(/</g, '&lt;')
                         .replace(/>/g, '&gt;');
      const attrs = editable
        ? ' data-id="' + rowId + '" data-col="' + colName +
          '" ondblclick="startEdit(this)"'
        : '';
      html += '<td class="' + cls + '"' + attrs + '>' + esc + '</td>';
    });
    html += '</tr>';
  });
  html += '</tbody></table>';
  wrap.innerHTML = html;
  // V7.37: append last write timestamp from /api/db/tables aggregate
  var meta = tableCounts[currentTab] || {};
  var lastTs = meta.last_ts || '';
  var total = (meta.total != null) ? meta.total : '?';
  document.getElementById('countBadge').innerHTML =
    '显示 <span>' + data.count + '</span> / ' + total +
    ' 行（上限 ' + data.limit + '）' +
    (lastTs ? ' · 最后写入 <span style="color:var(--ok)">' + lastTs + '</span>' : '') +
    (EDIT_MODE && isVoice
      ? ' · <span style="color:var(--warn)">双击单元格编辑</span>'
      : '');
}

// =========================================================================
// 隐藏编辑（URL ?edit=1 + voice_sessions 白名单字段）
// =========================================================================
function startEdit(td) {
  if (td.querySelector('textarea')) return;
  const id = td.getAttribute('data-id');
  const col = td.getAttribute('data-col');
  const original = (td.textContent === '—') ? '' : td.textContent;
  const ta = document.createElement('textarea');
  ta.className = 'inline-edit';
  ta.value = original;
  td.innerHTML = '';
  td.appendChild(ta);
  ta.focus();
  ta.select();
  let done = false;
  function commit(save) {
    if (done) return; done = true;
    if (!save) {
      td.textContent = original || '—';
      return;
    }
    const val = ta.value;
    fetch('/api/db/update/voice_sessions/' + id, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ field: col, value: val }),
    })
    .then(function (r) { return r.json().then(function (j) {
      return { ok: r.ok, body: j };
    }); })
    .then(function (res) {
      if (!res.ok || !res.body.ok) {
        td.textContent = original || '—';
        alert('保存失败：' + (res.body.error || 'unknown'));
        return;
      }
      td.textContent = val || '—';
      td.classList.add('just-saved');
      setTimeout(function () { td.classList.remove('just-saved'); }, 900);
    })
    .catch(function (e) {
      td.textContent = original || '—';
      alert('请求失败：' + e);
    });
  }
  ta.addEventListener('blur', function () { commit(true); });
  ta.addEventListener('keydown', function (e) {
    if (e.key === 'Escape') { e.preventDefault(); commit(false); }
    else if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
      e.preventDefault(); commit(true);
    }
  });
}

// =========================================================================
// 模型卡片视图
// =========================================================================
function renderModelCards(data) {
  const wrap = document.getElementById('tableWrap');
  if (!data.rows || !data.rows.length) {
    wrap.innerHTML = '<div class="empty">没有模型数据，请先跑 scripts/seed_models_and_embeddings.py</div>';
    return;
  }
  const cols = data.columns;
  function col(row, name) {
    const i = cols.indexOf(name);
    return i >= 0 ? row[i] : null;
  }
  let html = '<div class="model-grid" style="padding:4px;">';
  data.rows.forEach(function (row) {
    const name = col(row, 'name') || '';
    const ex = col(row, 'exercise') || '—';
    const path = col(row, 'path') || '';
    const arch = col(row, 'arch') || '';
    const valAcc = col(row, 'val_acc');
    const trainAcc = col(row, 'train_acc');
    const epochs = col(row, 'epochs');
    const sizeKb = col(row, 'size_kb');
    const paramsM = col(row, 'params_m');
    const dataset = col(row, 'dataset') || '';
    const trainedAt = col(row, 'trained_at') || '';
    const active = col(row, 'active');
    const notes = col(row, 'notes') || '';
    const pct = (valAcc != null) ? Math.round(valAcc * 100) : 0;
    html += '<div class="model-card ' + (active ? 'active' : '') + '">';
    html += '<div class="mc-name">' + name +
            '<span class="mc-ex">' + ex + '</span></div>';
    html += '<dl>';
    html += '<dt>架构</dt><dd>' + arch + '</dd>';
    html += '<dt>路径</dt><dd style="font-family:monospace;font-size:11px;">' +
            path + '</dd>';
    html += '<dt>参数量</dt><dd>' +
            (paramsM != null ? paramsM + ' M' : '—') + '</dd>';
    html += '<dt>文件大小</dt><dd>' +
            (sizeKb != null ? sizeKb.toFixed(1) + ' KB' : '—') + '</dd>';
    html += '<dt>val acc</dt><dd>';
    if (valAcc != null) {
      html += '<span class="acc-bar" style="--pct:' + pct + '%"></span>' +
              (valAcc * 100).toFixed(1) + '%';
    } else { html += '—'; }
    html += '</dd>';
    html += '<dt>train acc</dt><dd>' +
            (trainAcc != null ? (trainAcc * 100).toFixed(1) + '%' : '—') +
            '</dd>';
    html += '<dt>epochs</dt><dd>' + (epochs != null ? epochs : '—') +
            '</dd>';
    html += '<dt>数据集</dt><dd style="font-size:11px;">' + dataset +
            '</dd>';
    html += '<dt>训练时间</dt><dd>' + trainedAt + '</dd>';
    html += '</dl>';
    if (notes) {
      html += '<div class="mc-notes">ℹ️ ' + notes + '</div>';
    }
    html += '</div>';
  });
  html += '</div>';
  wrap.innerHTML = html;
  document.getElementById('countBadge').innerHTML =
    '显示 <span>' + data.rows.length + '</span> 个模型';
}

function renderDiag(d) {
  const wrap = document.getElementById('maintDiag');
  let html = '<h3 style="margin:0 0 10px;font-size:14px;">🩺 数据库诊断</h3>';
  html += '<dl style="margin:0;">';
  const rows = [
    ['DB 文件路径', d.db_path],
    ['文件存在', d.db_exists ? '✅ 是' : '❌ 否'],
    ['文件大小', d.db_size_kb + ' KB'],
    ['Journal Mode', d.journal_mode || '—'],
    ['SQLite 版本', d.sqlite_version || '—'],
    ['Flask CWD', d.cwd],
    ['项目根', d.project_root],
  ];
  rows.forEach(function (r) {
    html += '<div class="diag-row"><dt>' + r[0] + '</dt>' +
            '<dd>' + r[1] + '</dd></div>';
  });
  html += '</dl>';

  // schema 网格
  html += '<h4 style="margin:14px 0 6px;font-size:12px;color:var(--text-dim);">' +
          'SCHEMA 表状态（9 张白名单表）</h4><div class="schema-grid">';
  const allTables = (d.tables_existing || []).concat(d.tables_missing || []);
  allTables.sort();
  allTables.forEach(function (t) {
    const missing = (d.tables_missing || []).indexOf(t) >= 0;
    const rows = d.rows[t];
    let cls, status;
    if (missing) { cls = 'missing'; status = '❌ 不存在'; }
    else if (rows === 0) { cls = 'empty'; status = '⚠️ 空表'; }
    else { cls = 'ok'; status = '✅ ' + rows + ' 行'; }
    html += '<div class="schema-item ' + cls + '">' +
            '<div class="tname">' + t + '</div>' +
            '<div class="tmeta">' + status + '</div></div>';
  });
  html += '</div>';

  // migrations
  if (d.migrations_found && d.migrations_found.length) {
    html += '<h4 style="margin:14px 0 6px;font-size:12px;color:var(--text-dim);">' +
            '可用 MIGRATION 脚本</h4>';
    html += '<div style="font-size:11px;color:var(--text);">';
    d.migrations_found.forEach(function (m) {
      html += '<code style="display:inline-block;margin:2px 6px 2px 0;padding:2px 6px;background:var(--panel-2);border-radius:3px;">' + m + '</code>';
    });
    html += '</div>';
  }

  // 建议
  if (d.recommendations && d.recommendations.length) {
    html += '<div class="recs">';
    d.recommendations.forEach(function (r) {
      html += '<div class="r">💡 ' + r + '</div>';
    });
    html += '</div>';
  }

  wrap.innerHTML = html;
}

function runMaint(key, label, btn) {
  if (!confirm('确定执行：\n' + label + '\n\n这会直接改动数据库（会自动备份）。')) {
    return;
  }
  const out = document.getElementById('maintOut');
  out.style.display = 'block';
  out.textContent = '⏳ 执行中：' + label + ' …';
  const allBtns = document.querySelectorAll('.act-btn');
  allBtns.forEach(function (b) { b.disabled = true; });

  fetch('/api/db/maintenance/' + key, { method: 'POST' })
    .then(function (r) { return r.json().then(function (j) {
      return { status: r.status, body: j };
    }); })
    .then(function (res) {
      const b = res.body;
      const header = (b.ok ? '✅ ' : '❌ ') + label +
                     '  (rc=' + (b.returncode != null ? b.returncode : '?') +
                     ', ' + (b.elapsed_s || '?') + 's)\n' +
                     '--- stdout ---\n' + (b.stdout || '(空)') +
                     (b.stderr ? '\n--- stderr ---\n' + b.stderr : '') +
                     (b.error ? '\n--- error ---\n' + b.error : '');
      out.textContent = header;
      // 完成后刷新诊断 + 表计数
      loadDiag();
      loadTableCounts();
      if (currentTab && !TABS.find(function (t) { return t.key === currentTab; })
          .renderMode) {
        loadCurrentTab();
      }
    })
    .catch(function (e) {
      out.textContent = '❌ 请求失败：' + e;
    })
    .finally(function () {
      allBtns.forEach(function (b) { b.disabled = false; });
    });
}

function fdRenderHistogram(d) {
  const canvas = document.getElementById('fdHist');
  const dpr = window.devicePixelRatio || 1;
  const w = canvas.clientWidth, h = canvas.clientHeight;
  canvas.width = w * dpr; canvas.height = h * dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, w, h);

  const pad = 40;
  const [vmin, vmax] = d.range;
  const bins = d.bins;
  const binW = (w - 2 * pad) / bins;
  const labels = ['standard', 'compensating', 'non_standard'];
  const COLORS = {
    standard: '#8be9a3',
    compensating: '#f7c66b',
    non_standard: '#ff7a8a',
  };

  // 归一化：取所有 hist 最大比例作为 y 轴
  let ymax = 0;
  labels.forEach(function (l) {
    (d.hist[l] || []).forEach(function (v) { if (v > ymax) ymax = v; });
  });
  if (ymax <= 0) ymax = 1;

  // 网格
  ctx.strokeStyle = '#1e2433'; ctx.lineWidth = 1;
  for (let i = 0; i <= 5; i++) {
    const gy = pad + (h - 2 * pad) * i / 5;
    ctx.beginPath(); ctx.moveTo(pad, gy); ctx.lineTo(w - pad, gy); ctx.stroke();
  }
  // 坐标轴
  ctx.strokeStyle = '#3a4255';
  ctx.beginPath(); ctx.moveTo(pad, pad); ctx.lineTo(pad, h - pad);
  ctx.lineTo(w - pad, h - pad); ctx.stroke();

  // 3 条半透明直方图叠加
  labels.forEach(function (lbl, idx) {
    const arr = d.hist[lbl] || [];
    ctx.fillStyle = COLORS[lbl] + '66';  // 40% alpha
    ctx.strokeStyle = COLORS[lbl];
    ctx.lineWidth = 1.5;
    for (let i = 0; i < arr.length; i++) {
      const x = pad + i * binW;
      const y = h - pad - (arr[i] / ymax) * (h - 2 * pad);
      const barH = h - pad - y;
      ctx.fillRect(x, y, binW - 1, barH);
      ctx.strokeRect(x, y, binW - 1, barH);
    }
  });

  // 坐标注释
  ctx.fillStyle = '#8891a8';
  ctx.font = '11px sans-serif';
  ctx.fillText(vmin.toFixed(2), pad - 4, h - pad + 14);
  ctx.fillText(vmax.toFixed(2), w - pad - 30, h - pad + 14);
  ctx.fillText(d.dim_cn + ' (' + d.dim + ')', w / 2 - 60, h - 6);
  ctx.save(); ctx.translate(pad - 24, pad + 10); ctx.rotate(-Math.PI / 2);
  ctx.fillText('频次占比', 0, 0); ctx.restore();
}

function fdRenderSide(d) {

      '<span style="font-size:10px;">F &gt; 100 区分度好<br>' +

function fdRenderRadar(d) {
  const canvas = document.getElementById('fdRadar');
  const dpr = window.devicePixelRatio || 1;
  const w = canvas.clientWidth, h = canvas.clientHeight;
  canvas.width = w * dpr; canvas.height = h * dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, w, h);

  const dims = d.radar.dims;
  const dimsCn = d.radar.dims_cn;
  const n = dims.length;
  const cx = w / 2, cy = h / 2 + 6;
  const R = Math.min(w, h) / 2 - 42;

  // 5 层网格
  ctx.strokeStyle = '#252c3d';
  for (let ring = 1; ring <= 5; ring++) {
    const r = R * ring / 5;
    ctx.beginPath();
    for (let i = 0; i <= n; i++) {
      const a = -Math.PI / 2 + 2 * Math.PI * i / n;
      const x = cx + r * Math.cos(a);
      const y = cy + r * Math.sin(a);
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.stroke();
  }
  // 7 轴
  ctx.strokeStyle = '#3a4255'; ctx.lineWidth = 1;
  for (let i = 0; i < n; i++) {
    const a = -Math.PI / 2 + 2 * Math.PI * i / n;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + R * Math.cos(a), cy + R * Math.sin(a));
    ctx.stroke();
  }
  // 轴标签
  ctx.fillStyle = '#8891a8'; ctx.font = '10px sans-serif';
  ctx.textAlign = 'center';
  for (let i = 0; i < n; i++) {
    const a = -Math.PI / 2 + 2 * Math.PI * i / n;
    const r = R + 14;
    ctx.fillText(dimsCn[i], cx + r * Math.cos(a), cy + r * Math.sin(a) + 3);
  }
  ctx.textAlign = 'start';

  // 3 条类别多边形
  const COLORS = {
    standard: '#8be9a3',
    compensating: '#f7c66b',
    non_standard: '#ff7a8a',
  };
  ['standard', 'compensating', 'non_standard'].forEach(function (lbl) {
    const series = d.radar.series[lbl] || [];
    if (!series.length) return;
    ctx.strokeStyle = COLORS[lbl];
    ctx.fillStyle = COLORS[lbl] + '33';
    ctx.lineWidth = 1.6;
    ctx.beginPath();
    for (let i = 0; i <= n; i++) {
      const a = -Math.PI / 2 + 2 * Math.PI * (i % n) / n;
      const v = series[i % n];
      const r = R * v;
      const x = cx + r * Math.cos(a);
      const y = cy + r * Math.sin(a);
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.fill(); ctx.stroke();
  });
}

function fdRenderFtab(d) {
  const tbody = document.querySelector('#fdFtab tbody');
  const entries = Object.entries(d.all_dims_f)
    .sort(function (a, b) { return b[1] - a[1]; });

    html += '<tr' + active + '>' +

            '<td>' + cn + '</td>' +
            '<td class="num">' + f.toFixed(2) + '</td>' +
            '<td style="color:' + tagColor + '">' + tag + '</td>' +
            '</tr>';
  });
  tbody.innerHTML = html;
}

function renderScatter() {
  const wrap = document.getElementById('tableWrap');
  const exFilter = document.getElementById('fExercise').value;
  const q = exFilter ? '?exercise=' + encodeURIComponent(exFilter) : '';
  wrap.innerHTML = '<div class="empty">加载散点图…</div>';

  fetch('/api/db/embeddings' + q)
    .then(function (r) { return r.json(); })
    .then(function (d) {
      const pts = d.points || [];
      if (!pts.length) {
        wrap.innerHTML = '<div class="empty">没有 embeddings 数据。' +
                         '跑 <code>python3 scripts/seed_models_and_embeddings.py</code> 生成。</div>';
        return;
      }
      // 按 label 分组
      const byLabel = {};
      pts.forEach(function (p) {
        (byLabel[p.label] = byLabel[p.label] || []).push(p);
      });
      const labels = Object.keys(byLabel).sort();
      const COLORS = {
        'standard':     '#8be9a3',
        'compensating': '#f7c66b',
        'non_standard': '#ff7a8a',
      };
      const LABEL_CN = {
        'standard': '标准', 'compensating': '代偿', 'non_standard': '非标准',
      };

      // 构造 legend
      let legendHtml = '<div class="legend"><h4>类别图例</h4>';
      labels.forEach(function (lbl) {
        const color = COLORS[lbl] || '#5ec8ff';
        legendHtml += '<div class="lg-item">' +
                      '<span class="dot" style="background:' + color + '"></span>' +
                      (LABEL_CN[lbl] || lbl) + '（' + byLabel[lbl].length + '）' +
                      '</div>';
      });
      // 简单区分度指标：类间质心距 vs 类内平均距
      function centroid(arr) {
        let mx = 0, my = 0;
        arr.forEach(function (p) { mx += p.x; my += p.y; });
        return [mx / arr.length, my / arr.length];
      }
      function avgDist(arr, c) {
        let s = 0;
        arr.forEach(function (p) {
          s += Math.hypot(p.x - c[0], p.y - c[1]);
        });
        return s / arr.length;
      }
      const cents = labels.map(function (l) { return centroid(byLabel[l]); });
      const intra = labels.map(function (l, i) {
        return avgDist(byLabel[l], cents[i]);
      });
      let interSum = 0, nPairs = 0;
      for (let i = 0; i < cents.length; i++) {
        for (let j = i + 1; j < cents.length; j++) {
          interSum += Math.hypot(cents[i][0] - cents[j][0],
                                 cents[i][1] - cents[j][1]);
          nPairs++;
        }
      }
      const interMean = nPairs ? interSum / nPairs : 0;
      const intraMean = intra.reduce(function (a, b) { return a + b; }, 0)
                       / intra.length;
      const ratio = intraMean > 0 ? (interMean / intraMean) : 0;
      legendHtml += '<div class="stats">' +
        '总样本：<strong>' + pts.length + '</strong><br>' +
        '类间质心距：<strong>' + interMean.toFixed(2) + '</strong><br>' +
        '类内平均距：<strong>' + intraMean.toFixed(2) + '</strong><br>' +
        '区分度比值：<strong>' + ratio.toFixed(2) +
          '</strong><br><span style="font-size:10px;">(比值 &gt; 1.5 表示可分性好)</span>' +
        '</div></div>';

      wrap.innerHTML =
        '<div class="scatter-wrap">' +
          '<canvas id="scatter"></canvas>' +
          legendHtml +
        '</div>';

      // 绘制
      const canvas = document.getElementById('scatter');
      const dpr = window.devicePixelRatio || 1;
      const w = canvas.clientWidth, h = canvas.clientHeight;
      canvas.width = w * dpr; canvas.height = h * dpr;
      const ctx = canvas.getContext('2d');
      ctx.scale(dpr, dpr);

      // 计算范围
      const xs = pts.map(function (p) { return p.x; });
      const ys = pts.map(function (p) { return p.y; });
      const xmin = Math.min.apply(null, xs) - 0.3;
      const xmax = Math.max.apply(null, xs) + 0.3;
      const ymin = Math.min.apply(null, ys) - 0.3;
      const ymax = Math.max.apply(null, ys) + 0.3;
      const pad = 36;
      function sx(x) {
        return pad + (x - xmin) / (xmax - xmin) * (w - 2 * pad);
      }
      function sy(y) {
        return h - pad - (y - ymin) / (ymax - ymin) * (h - 2 * pad);
      }

      // 网格 + 轴
      ctx.strokeStyle = '#1e2433';
      ctx.lineWidth = 1;
      for (let i = 0; i <= 10; i++) {
        const gx = pad + (w - 2 * pad) * i / 10;
        const gy = pad + (h - 2 * pad) * i / 10;
        ctx.beginPath(); ctx.moveTo(gx, pad); ctx.lineTo(gx, h - pad); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(pad, gy); ctx.lineTo(w - pad, gy); ctx.stroke();
      }
      ctx.strokeStyle = '#3a4255';
      ctx.beginPath(); ctx.moveTo(pad, h - pad); ctx.lineTo(w - pad, h - pad); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(pad, pad); ctx.lineTo(pad, h - pad); ctx.stroke();
      ctx.fillStyle = '#8891a8'; ctx.font = '11px sans-serif';
      ctx.fillText('PCA-2', w - pad - 50, h - pad + 18);
      ctx.save(); ctx.translate(pad - 22, pad + 10); ctx.rotate(-Math.PI / 2);
      ctx.fillText('PCA-1', 0, 0); ctx.restore();

      // 散点 + 类别质心
      labels.forEach(function (lbl, idx) {
        const color = COLORS[lbl] || '#5ec8ff';
        byLabel[lbl].forEach(function (p) {
          ctx.beginPath();
          ctx.arc(sx(p.x), sy(p.y), 4, 0, Math.PI * 2);
          ctx.fillStyle = color + 'cc';
          ctx.fill();
          ctx.strokeStyle = color; ctx.lineWidth = 1; ctx.stroke();
        });
        // 质心
        const c = cents[idx];
        ctx.beginPath();
        ctx.arc(sx(c[0]), sy(c[1]), 9, 0, Math.PI * 2);
        ctx.fillStyle = color; ctx.fill();
        ctx.strokeStyle = '#0b0e13'; ctx.lineWidth = 2; ctx.stroke();
      });

      document.getElementById('countBadge').innerHTML =
        '散点 <span>' + pts.length + '</span> 个 · ' +
        labels.length + ' 类 · 区分度 ' + ratio.toFixed(2);
    });
}

// =========================================================================
// 路由分发
// =========================================================================
function loadCurrentTab() {
  const tab = TABS.find(function (t) { return t.key === currentTab; });
  if (tab && tab.renderMode === 'feature_dist') {
    renderFeatureDist();
    return;
  }
  if (tab && tab.renderMode === 'scatter') {
    renderScatter();
    return;
  }
  const exercise = document.getElementById('fExercise').value;
  const seed = document.getElementById('fSeed').value;
  const limit = document.getElementById('fLimit').value;
  const q = '?exercise=' + encodeURIComponent(exercise) +
            '&seed=' + seed + '&limit=' + limit;
  document.getElementById('tableWrap').innerHTML =
    '<div class="empty">加载中…</div>';
  fetch('/api/db/query/' + currentTab + q)
    .then(function (r) { return r.json(); })
    .then(function (data) {
      if (tab && tab.renderMode === 'cards') {
        renderModelCards(data);
      } else {
        renderRows(data);
      }
    })
    .catch(function (e) {
      document.getElementById('tableWrap').innerHTML =
        '<div class="err">请求失败：' + e + '</div>';
    });
}

['fExercise', 'fSeed', 'fLimit'].forEach(function (id) {
  document.getElementById(id).addEventListener('change', loadCurrentTab);
});

// 初始化 seed 筛选器（URL 指定 > 默认 all）
document.getElementById('fSeed').value = DEFAULT_SEED_FILTER;

renderTabs();
loadTableCounts();
loadExercises();
loadCurrentTab();
</script>
